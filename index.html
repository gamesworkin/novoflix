<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePrivate V3 - Streaming Pessoal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="login-container">
        <div class="login-box">
            <h2><i class="fa-solid fa-bolt"></i> CinePrivate</h2>
            <form id="login-form">
                <div class="input-group">
                    <label>Usuário</label>
                    <input type="text" id="username" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
                <div id="login-error" class="error-message">Acesso negado.</div>
            </form>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="main-content" class="main-wrapper hidden">
        
        <!-- MENU LATERAL RETRÁTIL -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-toggle" id="toggle-menu">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-header">
                    <h3>Navegação</h3>
                </div>
                <nav id="sidebar-menu" class="menu-channels"></nav>
                <button id="btn-logout" class="btn-logout"><i class="fa-solid fa-power-off"></i> <span>Sair</span></button>
            </div>
        </aside>

        <!-- ÁREA DOS VÍDEOS -->
        <main class="content-area">
            <header class="main-header">
                <h1 id="current-view-title">Início</h1>
            </header>
            <!-- Onde ficam listadas as capas iniciais das categorias -->
            <section id="categories-grid" class="categories-grid"></section>
        </main>
    </div>

    <!-- MODAL DO PLAYER (HÍBRIDO: IFRAME OU VIDEO TAG) -->
    <div id="video-modal" class="video-modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button id="close-modal" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            
            <div id="player-wrapper" class="player-container">
                <!-- Conteúdo injetado dinamicamente via JS -->
            </div>

            <div class="player-controls-bar">
                <h3 id="modal-video-title">Título</h3>
                <div class="controls-buttons">
                    <button id="prev-video-btn" class="control-btn"><i class="fa-solid fa-backward"></i></button>
                    <button id="next-video-btn" class="control-btn"><i class="fa-solid fa-forward"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
